# SIMRS ZEN - Docker Compose for Local Development
# Local PostgreSQL + Redis + Node.js API Backend

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: simrs-zen-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-simrs}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-simrs2024}
      POSTGRES_DB: ${DB_NAME:-simrs_zen}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-simrs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and rate limiting
  redis:
    image: redis:7-alpine
    container_name: simrs-zen-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js API Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simrs-zen-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DATABASE_URL: postgresql://${DB_USER:-simrs}:${DB_PASSWORD:-simrs2024}@postgres:5432/${DB_NAME:-simrs_zen}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      BPJS_CONS_ID: ${BPJS_CONS_ID:-}
      BPJS_SECRET_KEY: ${BPJS_SECRET_KEY:-}
      BPJS_USER_KEY: ${BPJS_USER_KEY:-}
      SATUSEHAT_CLIENT_ID: ${SATUSEHAT_CLIENT_ID:-}
      SATUSEHAT_CLIENT_SECRET: ${SATUSEHAT_CLIENT_SECRET:-}
      SATUSEHAT_ORGANIZATION_ID: ${SATUSEHAT_ORGANIZATION_ID:-}
      SATU_SEHAT_CLIENT_ID: ${SATUSEHAT_CLIENT_ID:-}
      SATU_SEHAT_CLIENT_SECRET: ${SATUSEHAT_CLIENT_SECRET:-}
      SATU_SEHAT_ORG_ID: ${SATUSEHAT_ORGANIZATION_ID:-}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_MODE: nodejs
        VITE_API_URL: /api
    container_name: simrs-zen-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: simrs-zen-network
    driver: bridge
