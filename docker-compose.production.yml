version: '3.8'\n\nservices:\n  backend:\n    build:\n      context: ./backend\n      dockerfile: Dockerfile\n    environment:\n      DB_HOST: db\n      DB_PORT: 5432\n      DB_USER: user\n      DB_PASSWORD: password\n      DB_NAME: sehat_jelita\n      NODE_ENV: production\n    healthcheck:\n      test: [ 'CMD', 'curl', '-f', 'http://localhost:3000/health' ]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\n  frontend:\n    build:\n      context: ./frontend\n      dockerfile: Dockerfile\n    environment:\n      REACT_APP_API_URL: http://backend:3000\n    healthcheck:\n      test: [ 'CMD', 'curl', '-f', 'http://localhost:3001/health' ]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\n  db:\n    image: postgres:15-alpine\n    environment:\n      POSTGRES_DB: sehat_jelita\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n    healthcheck:\n      test: [ 'CMD-SHELL', 'pg_isready -U user' ]\n      interval: 30s\n      timeout: 5s\n      retries: 5\n\n  redis:\n    image: redis:7-alpine\n    healthcheck:\n      test: [ 'CMD', 'redis-cli', 'ping' ]\n      interval: 30s\n      timeout: 5s\n      retries: 5\n\n  nginx:\n    image: nginx:alpine\n    ports:\n      - "80:80"\n      - "443:443"\n    volumes:\n      - ./nginx.conf:/etc/nginx/nginx.conf\n    depends_on:\n      - backend\n      - frontend\n    healthcheck:\n      test: [ 'CMD', 'curl', '-f', 'http://localhost:80' ]\n      interval: 30s\n      timeout: 10s\n      retries: 3\n\nnetworks:\n  default:\n    driver: bridge\n