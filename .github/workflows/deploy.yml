name: Deploy ke Cloud Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build dan Deploy via FTP
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependensi
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_MODE: ${{ vars.VITE_API_MODE || 'nodejs' }}
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://simrszen.id/api' }}
        run: npm run build

      - name: Deploy ke hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ vars.FTP_SERVER || '193.203.172.50' }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          server-dir: public_html/
