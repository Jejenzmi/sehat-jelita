name: CI Workflow  

on:  
  push:  
    branches:  
      - main  
  pull_request:  
    branches:  
      - main  

jobs:  
  build:  
    runs-on: ubuntu-latest  
    steps:  
      - name: Checkout code  
        uses: actions/checkout@v2  
      - name: Set up Docker Buildx  
        uses: docker/setup-buildx-action@v1  
      - name: Cache Docker layers  
        uses: actions/cache@v2  
        with:  
          path: /tmp/.buildx-cache  
          key: ${{ runner.os }}-buildx-${{ github.sha }}  
          restore-keys:  
            - ${{ runner.os }}-buildx-  
      - name: Build Docker image  
        run: |  
          docker build . -t my-image:${{ github.sha }}  
      - name: Docker Lint  
        run: |  
          docker run --rm -v $(pwd):/app wader/alpine:latest 
          shellcheck ./*.sh  
      - name: Run Security Checks  
        run: |  
          docker run --rm -v $(pwd):/app aquasec/trivy:latest --silent --exit-code 1 --no-progress my-image:${{ github.sha }}  
      - name: Run Tests  
        run: |  
          docker run --rm my-image:${{ github.sha }} pytest