name: CI - Lint, Type Check & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend - Lint, Type Check & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependensi frontend
        run: npm ci

      - name: Lint frontend
        run: npm run lint
        continue-on-error: true

      - name: Type check frontend
        run: npx tsc --noEmit

      - name: Build frontend
        env:
          VITE_API_MODE: nodejs
          VITE_API_URL: /api
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  backend:
    name: Backend - Lint & Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependensi backend
        working-directory: backend
        run: npm ci

      - name: Check backend syntax
        working-directory: backend
        run: node --check src/app.js
