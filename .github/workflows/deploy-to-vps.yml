name: Deploy ke VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy ke VPS via SSH
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            REPO_DIR="${{ vars.VPS_APP_DIR || '/opt/sehat-jelita' }}"

            # Clone repository jika belum ada
            if [ ! -d "${REPO_DIR}/.git" ]; then
              git clone https://github.com/${{ github.repository }}.git "${REPO_DIR}"
            fi

            cd "${REPO_DIR}"
            bash scripts/deploy.sh

      - name: Notifikasi deployment berhasil
        if: success()
        run: |
          echo "✅ Deployment ke VPS berhasil pada $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"

      - name: Notifikasi deployment gagal
        if: failure()
        run: |
          echo "❌ Deployment ke VPS GAGAL pada $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Triggered by: ${{ github.actor }}"
          exit 1
