name: Build Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image namespace
        id: meta
        run: |
          echo "namespace=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
          echo "repo_namespace=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.DOCKERHUB_REGISTRY }}/${{ steps.meta.outputs.namespace }}/simrs-zen-api:latest
            ${{ env.DOCKERHUB_REGISTRY }}/${{ steps.meta.outputs.namespace }}/simrs-zen-api:${{ github.sha }}
            ${{ env.GHCR_REGISTRY }}/${{ steps.meta.outputs.repo_namespace }}/simrs-zen-api:latest
            ${{ env.GHCR_REGISTRY }}/${{ steps.meta.outputs.repo_namespace }}/simrs-zen-api:${{ github.sha }}
          cache-from: type=gha,scope=backend-${{ hashFiles('backend/Dockerfile', 'backend/prisma/schema.prisma') }}
          cache-to: type=gha,scope=backend-${{ hashFiles('backend/Dockerfile', 'backend/prisma/schema.prisma') }},mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.DOCKERHUB_REGISTRY }}/${{ steps.meta.outputs.namespace }}/simrs-zen-frontend:latest
            ${{ env.DOCKERHUB_REGISTRY }}/${{ steps.meta.outputs.namespace }}/simrs-zen-frontend:${{ github.sha }}
            ${{ env.GHCR_REGISTRY }}/${{ steps.meta.outputs.repo_namespace }}/simrs-zen-frontend:latest
            ${{ env.GHCR_REGISTRY }}/${{ steps.meta.outputs.repo_namespace }}/simrs-zen-frontend:${{ github.sha }}
          build-args: |
            VITE_API_MODE=nodejs
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set GHCR package visibility to public
        if: github.event_name == 'push'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          # Use GH_PAT if available, otherwise fall back to GITHUB_TOKEN.
          # GH_PAT (a Personal Access Token with write:packages scope) is needed
          # to change visibility of packages owned by a personal account.
          # GITHUB_TOKEN may work when the package is linked to this repository.
          TOKEN="${GH_PAT:-${GITHUB_TOKEN}}"
          if [ -z "${TOKEN}" ]; then
            echo "WARNING: No token available – GHCR package visibility NOT updated." >&2
            echo "Set the GH_PAT repository secret (PAT with write:packages scope) to enable automatic visibility updates." >&2
            exit 0
          fi
          for suffix in "simrs-zen-api" "simrs-zen-frontend"; do
            pkg="${REPO_NAME}%2F${suffix}"
            status=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${pkg}" \
              -d '{"visibility":"public"}')
            if [ "${status}" -ge 200 ] && [ "${status}" -lt 300 ]; then
              echo "${suffix}: visibility set to public (HTTP ${status})"
            else
              echo "WARNING: failed to set ${suffix} visibility (HTTP ${status})." >&2
              echo "If this persists, set GH_PAT secret (PAT with write:packages scope) and re-run the workflow." >&2
            fi
          done
