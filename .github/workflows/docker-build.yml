name: Build Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          dockerfile: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/simrs-zen-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/simrs-zen-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: ./Dockerfile.frontend
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/simrs-zen-frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/simrs-zen-frontend:${{ github.sha }}
          build-args: |
            VITE_API_MODE=nodejs
            VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set GHCR package visibility to public
        if: github.event_name == 'push'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ -z "${GH_PAT}" ]; then
            echo "GH_PAT secret not set – skipping GHCR visibility update."
            exit 0
          fi
          for suffix in "simrs-zen-api" "simrs-zen-frontend"; do
            pkg="${REPO_NAME}%2F${suffix}"
            status=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
              -H "Authorization: Bearer ${GH_PAT}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/user/packages/container/${pkg}" \
              -d '{"visibility":"public"}')
            if [ "${status}" -ge 200 ] && [ "${status}" -lt 300 ]; then
              echo "${suffix}: visibility set to public (HTTP ${status})"
            else
              echo "WARNING: failed to set ${suffix} visibility (HTTP ${status})" >&2
            fi
          done
